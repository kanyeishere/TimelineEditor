appId: com.timeline-editor.app
productName: Timeline Editor
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
  - data/**/*
  - package.json
asar: true
win:
  target:
    - dir
  signAndEditExecutable: false
  verifyUpdateCodeSignature: false
  extraResources: []
electronLanguages:
  - zh-CN
  - en
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
npmRebuild: false
publish: null
extraMetadata:
  main: dist-electron/index.js
